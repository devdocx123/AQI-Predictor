name: Hourly AQI Data Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
 contents: write
jobs:
  fetch-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch pipeline
        run: python pipeline/fetch.py

      - name: Run feature pipeline
        run: python pipeline/features.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/raw/raw_aqi_data.csv
          git add data/processed/processed_aqi_data.csv

          git commit -m "Automated AQI data update" || echo "No changes to commit"

          git push
