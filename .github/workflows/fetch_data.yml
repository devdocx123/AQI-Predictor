name: Fetch AQI + Push Features to Hopsworks

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pipeline dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: data/raw/raw_aqi_data.csv
          key: raw-aqi-data-${{ runner.os }}
          restore-keys: raw-aqi-data-

      - name: Fetch AQI data
        env:
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
        run: python pipeline/fetch.py

      - name: Push features to Hopsworks
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
        run: python pipeline/features.py

      - name: Commit raw data update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/raw_aqi_data.csv
          git diff --staged --quiet || git commit -m "chore: update raw AQI data [skip ci]"
          git pull --rebase origin main
          git push