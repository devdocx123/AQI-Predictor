name: Train Model from Hopsworks Features

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pipeline dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Train model (with retry)
        env:
          HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT: ${{ secrets.HOPSWORKS_PROJECT }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            python pipeline/train.py && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git diff --staged --quiet || git commit -m "chore: retrain model [skip ci]"
          git pull --rebase origin main
          git push
